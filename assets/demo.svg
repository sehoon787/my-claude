<svg xmlns="http://www.w3.org/2000/svg" width="700" height="430" viewBox="0 0 700 430">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="window-clip">
      <rect x="0" y="0" width="700" height="430" rx="8" ry="8"/>
    </clipPath>
    <style>
      .mono { font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace; }
    </style>
  </defs>

  <!-- Window shadow -->
  <rect x="10" y="14" width="680" height="412" rx="8" ry="8" fill="#000000" opacity="0.45" filter="url(#shadow)"/>

  <!-- Window background -->
  <rect x="0" y="0" width="700" height="430" rx="8" ry="8" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="700" height="38" rx="8" ry="8" fill="#313244"/>
  <!-- Square off bottom corners of title bar -->
  <rect x="0" y="22" width="700" height="16" fill="#313244"/>

  <!-- Title bar separator -->
  <line x1="0" y1="38" x2="700" y2="38" stroke="#45475a" stroke-width="1"/>

  <!-- Traffic light dots -->
  <circle cx="20" cy="19" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="19" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="19" r="6" fill="#a6e3a1"/>

  <!-- Title text -->
  <text x="350" y="24" text-anchor="middle" dominant-baseline="middle" class="mono" font-size="13" fill="#cdd6f4" opacity="0.85">claude — my-claude</text>

  <!-- Terminal content area -->
  <!-- Prompt line -->
  <text x="24" y="68" class="mono" font-size="13" fill="#cdd6f4">$ claude</text>

  <!-- Box top border -->
  <text x="24" y="93" class="mono" font-size="13" fill="#585b70">╭─────────────────────────────────────────────────╮</text>

  <!-- Box line 1 -->
  <text x="24" y="110" class="mono" font-size="13" fill="#585b70">│</text>
  <text x="32" y="110" class="mono" font-size="13" fill="#cdd6f4">  my-claude — Boss Orchestrator</text>
  <text x="404" y="110" class="mono" font-size="13" fill="#585b70">│</text>

  <!-- Box line 2 -->
  <text x="24" y="127" class="mono" font-size="13" fill="#585b70">│</text>
  <text x="32" y="127" class="mono" font-size="13" fill="#6c7086">  10 agents · 3 hooks · 3 MCP servers</text>
  <text x="404" y="127" class="mono" font-size="13" fill="#585b70">│</text>

  <!-- Box bottom border -->
  <text x="24" y="144" class="mono" font-size="13" fill="#585b70">╰─────────────────────────────────────────────────╯</text>

  <!-- User prompt -->
  <text x="24" y="172" class="mono" font-size="13" fill="#585b70">&gt;</text>
  <text x="36" y="172" class="mono" font-size="13" fill="#cdd6f4"> Refactor the auth module and add unit tests</text>

  <!-- Analyzing line -->
  <text x="24" y="197" class="mono" font-size="13" fill="#f9e2af">⚡</text>
  <text x="42" y="197" class="mono" font-size="13" fill="#cdd6f4">Boss analyzing intent...</text>

  <!-- Tree line 1 -->
  <text x="24" y="214" class="mono" font-size="13" fill="#585b70">  ├─</text>
  <text x="52" y="214" class="mono" font-size="13" fill="#6c7086"> Category: </text>
  <text x="121" y="214" class="mono" font-size="13" fill="#cdd6f4">Implementation + Testing</text>

  <!-- Tree line 2 -->
  <text x="24" y="231" class="mono" font-size="13" fill="#585b70">  ├─</text>
  <text x="52" y="231" class="mono" font-size="13" fill="#6c7086"> Complexity: </text>
  <text x="129" y="231" class="mono" font-size="13" fill="#cdd6f4">High → using Opus</text>

  <!-- Tree line 3 -->
  <text x="24" y="248" class="mono" font-size="13" fill="#585b70">  └─</text>
  <text x="52" y="248" class="mono" font-size="13" fill="#6c7086"> Strategy: </text>
  <text x="121" y="248" class="mono" font-size="13" fill="#cdd6f4">Parallel delegation</text>

  <!-- Delegating header -->
  <text x="24" y="273" class="mono" font-size="13" fill="#89dceb">📋</text>
  <text x="42" y="273" class="mono" font-size="13" fill="#cdd6f4">Delegating to specialist agents:</text>

  <!-- Agent 1: Hephaestus -->
  <text x="24" y="290" class="mono" font-size="13" fill="#585b70">  ├─</text>
  <text x="52" y="290" class="mono" font-size="13" fill="#585b70"> [</text>
  <text x="60" y="290" class="mono" font-size="13" fill="#89b4fa">Hephaestus</text>
  <text x="130" y="290" class="mono" font-size="13" fill="#585b70">]</text>
  <text x="138" y="290" class="mono" font-size="13" fill="#6c7086"> Refactor auth module     </text>
  <text x="308" y="290" class="mono" font-size="13" fill="#fab387">■■■■■■■■■■</text>
  <text x="378" y="290" class="mono" font-size="13" fill="#a6e3a1"> done</text>

  <!-- Agent 2: Atlas -->
  <text x="24" y="307" class="mono" font-size="13" fill="#585b70">  ├─</text>
  <text x="52" y="307" class="mono" font-size="13" fill="#585b70"> [</text>
  <text x="60" y="307" class="mono" font-size="13" fill="#89b4fa">Atlas</text>
  <text x="94" y="307" class="mono" font-size="13" fill="#585b70">]</text>
  <text x="102" y="307" class="mono" font-size="13" fill="#6c7086">      Coordinate test plan      </text>
  <text x="308" y="307" class="mono" font-size="13" fill="#fab387">■■■■■■■■■■</text>
  <text x="378" y="307" class="mono" font-size="13" fill="#a6e3a1"> done</text>

  <!-- Agent 3: Momus -->
  <text x="24" y="324" class="mono" font-size="13" fill="#585b70">  └─</text>
  <text x="52" y="324" class="mono" font-size="13" fill="#585b70"> [</text>
  <text x="60" y="324" class="mono" font-size="13" fill="#89b4fa">Momus</text>
  <text x="98" y="324" class="mono" font-size="13" fill="#585b70">]</text>
  <text x="106" y="324" class="mono" font-size="13" fill="#6c7086">      Review changes            </text>
  <text x="308" y="324" class="mono" font-size="13" fill="#fab387">■■■■■■■■</text>
  <text x="360" y="324" class="mono" font-size="13" fill="#45475a">░░</text>
  <text x="378" y="324" class="mono" font-size="13" fill="#f9e2af"> 80%</text>

  <!-- Verification lines -->
  <text x="24" y="351" class="mono" font-size="13" fill="#a6e3a1">✓</text>
  <text x="38" y="351" class="mono" font-size="13" fill="#cdd6f4"> Verification: 3/3 agents verified independently</text>

  <text x="24" y="368" class="mono" font-size="13" fill="#a6e3a1">✓</text>
  <text x="38" y="368" class="mono" font-size="13" fill="#cdd6f4"> Tests: </text>
  <text x="83" y="368" class="mono" font-size="13" fill="#a6e3a1">12 passed</text>
  <text x="148" y="368" class="mono" font-size="13" fill="#cdd6f4">, 0 failed</text>

  <text x="24" y="385" class="mono" font-size="13" fill="#a6e3a1">✓</text>
  <text x="38" y="385" class="mono" font-size="13" fill="#cdd6f4"> Session complete</text>

  <!-- Cursor blink indicator -->
  <rect x="38" y="399" width="8" height="14" fill="#cdd6f4" opacity="0.7" rx="1"/>
</svg>
