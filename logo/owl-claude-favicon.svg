<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>The Maestro Owl — my-claude (favicon)</title>

  <g id="owl-claude-favicon">

    <!-- Head: ellipse for natural rounded shape -->
    <ellipse cx="16" cy="15" rx="13" ry="12" fill="#d97757"/>

    <!-- Facial disc -->
    <ellipse cx="16" cy="17" rx="10" ry="9" fill="#c86845" opacity="0.35"/>

    <!-- Brow tufts: repositioned for ellipse head -->
    <polygon points="10,5 8,1 13,4" fill="#b85a3a"/>
    <polygon points="22,5 24,1 19,4" fill="#b85a3a"/>

    <!-- Left eye sclera -->
    <circle cx="11" cy="16" r="5.5" fill="#faf7f4"/>
    <!-- Left eye iris -->
    <circle cx="11" cy="16" r="3.8" fill="#e8a087"/>
    <!-- Left eye pupil -->
    <circle cx="11" cy="16" r="2" fill="#2d1f17"/>
    <!-- Left eye highlight -->
    <circle cx="12.2" cy="14.8" r="0.9" fill="#faf7f4" opacity="0.9"/>

    <!-- Right eye sclera -->
    <circle cx="21" cy="16" r="5.5" fill="#faf7f4"/>
    <!-- Right eye iris -->
    <circle cx="21" cy="16" r="3.8" fill="#e8a087"/>
    <!-- Right eye pupil -->
    <circle cx="21" cy="16" r="2" fill="#2d1f17"/>
    <!-- Right eye highlight -->
    <circle cx="22.2" cy="14.8" r="0.9" fill="#faf7f4" opacity="0.9"/>

    <!-- Beak -->
    <polygon points="16,22 14,25 18,25" fill="#b85a3a"/>

    <!-- Orbital gem nodes: 3 small purple dots -->
    <circle cx="3" cy="10" r="1.5" fill="#7c3aed" opacity="0.7"/>
    <circle cx="29" cy="10" r="1.5" fill="#7c3aed" opacity="0.7"/>
    <circle cx="16" cy="2" r="1.2" fill="#a78bfa" opacity="0.6"/>

  </g>
</svg>
