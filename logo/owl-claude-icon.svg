<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>The Maestro Owl — my-claude</title>

  <defs>
    <!-- Purple glow filter for orbital nodes -->
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g id="owl-claude">

    <!-- Obsidian orbital graph — arcs orbiting the head -->
    <g id="orbitals" opacity="0.55">
      <!-- Outer orbital arc, left side -->
      <path d="M 38,40 Q 18,78 34,118" stroke="#7c3aed" stroke-width="0.8" fill="none" opacity="0.5"/>
      <!-- Outer orbital arc, right side -->
      <path d="M 162,40 Q 182,78 166,118" stroke="#7c3aed" stroke-width="0.8" fill="none" opacity="0.5"/>
      <!-- Upper orbital arc -->
      <path d="M 55,20 Q 100,8 145,20" stroke="#a78bfa" stroke-width="0.7" fill="none" opacity="0.45"/>
      <!-- Inner connecting lines (graph edges) -->
      <line x1="28" y1="55" x2="18" y2="80" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
      <line x1="18" y1="80" x2="30" y2="105" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
      <line x1="172" y1="55" x2="182" y2="80" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
      <line x1="182" y1="80" x2="170" y2="105" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
      <line x1="62" y1="16" x2="28" y2="55" stroke="#a78bfa" stroke-width="0.5" opacity="0.35"/>
      <line x1="138" y1="16" x2="172" y2="55" stroke="#a78bfa" stroke-width="0.5" opacity="0.35"/>
      <line x1="100" y1="10" x2="62" y2="16" stroke="#a78bfa" stroke-width="0.5" opacity="0.35"/>
      <line x1="100" y1="10" x2="138" y2="16" stroke="#a78bfa" stroke-width="0.5" opacity="0.35"/>
    </g>
    <!-- Orbital gem nodes -->
    <g id="orbital-nodes" filter="url(#glow-purple)">
      <!-- Left cluster -->
      <circle cx="28" cy="55" r="3" fill="#7c3aed" opacity="0.7"/>
      <circle cx="18" cy="80" r="2" fill="#a78bfa" opacity="0.6"/>
      <circle cx="30" cy="105" r="2.5" fill="#7c3aed" opacity="0.65"/>
      <!-- Right cluster -->
      <circle cx="172" cy="55" r="3" fill="#7c3aed" opacity="0.7"/>
      <circle cx="182" cy="80" r="2" fill="#a78bfa" opacity="0.6"/>
      <circle cx="170" cy="105" r="2.5" fill="#7c3aed" opacity="0.65"/>
      <!-- Top cluster -->
      <circle cx="100" cy="10" r="2.5" fill="#a78bfa" opacity="0.6"/>
      <circle cx="62" cy="16" r="1.8" fill="#6d28d9" opacity="0.55"/>
      <circle cx="138" cy="16" r="1.8" fill="#6d28d9" opacity="0.55"/>
    </g>

    <!-- Body: compact stubby rounded shape -->
    <path id="body" d="M72 132 Q62 150 66 174 Q100 184 134 174 Q138 150 128 132 Z" fill="#d97757"/>

    <!-- Left wing: geometric angles, sweeps left and slightly down -->
    <path id="wing-left" d="M72 132 L60 128 L42 148 L48 158 L66 150 L72 138 Z" fill="#b85a3a"/>

    <!-- Right wing: raised, holds baton — more geometric -->
    <path id="wing-right" d="M128 132 L140 126 L158 136 L156 148 L138 146 L128 138 Z" fill="#b85a3a"/>

    <!-- Baton: integrated with right wing tip -->
    <g id="baton">
      <line x1="155" y1="132" x2="178" y2="110" stroke="#b85a3a" stroke-width="3" stroke-linecap="round"/>
      <circle cx="178" cy="110" r="4.5" fill="#b85a3a"/>
      <circle cx="178" cy="110" r="2.5" fill="#e8a087"/>
    </g>

    <!-- Feet: two small geometric shapes grounding the character -->
    <g id="feet" fill="#b85a3a">
      <rect x="82" y="176" width="14" height="7" rx="3.5"/>
      <rect x="104" y="176" width="14" height="7" rx="3.5"/>
    </g>

    <!-- Head: proper ellipse for natural rounded owl head -->
    <ellipse id="head" cx="100" cy="78" rx="56" ry="52" fill="#d97757"/>

    <!-- Facial disc: slightly darker oval surrounding eye area -->
    <ellipse id="facial-disc" cx="100" cy="82" rx="44" ry="38" fill="#c86845" opacity="0.35"/>

    <!-- Brow tufts: sharper crown-like pentagons, repositioned for ellipse head -->
    <g id="brow-tufts" fill="#b85a3a">
      <!-- Left tuft -->
      <polygon points="76,32 66,12 80,20 84,30"/>
      <!-- Right tuft -->
      <polygon points="124,32 134,12 120,20 116,30"/>
    </g>

    <!-- Eyes: dominant, large -->
    <g id="eyes">
      <!-- Left eye sclera -->
      <circle cx="80" cy="82" r="24" fill="#faf7f4"/>
      <!-- Left eye iris -->
      <circle cx="80" cy="82" r="16" fill="#e8a087"/>
      <!-- Left eye inner iris ring for depth -->
      <circle cx="80" cy="82" r="12" fill="#d97757" opacity="0.4"/>
      <!-- Left eye pupil -->
      <circle cx="80" cy="82" r="8" fill="#2d1f17"/>
      <!-- Left eye highlight primary -->
      <circle cx="85" cy="77" r="3.5" fill="#faf7f4" opacity="0.85"/>
      <!-- Left eye highlight secondary -->
      <circle cx="77" cy="87" r="1.5" fill="#faf7f4" opacity="0.4"/>

      <!-- Right eye sclera -->
      <circle cx="120" cy="82" r="24" fill="#faf7f4"/>
      <!-- Right eye iris -->
      <circle cx="120" cy="82" r="16" fill="#e8a087"/>
      <!-- Right eye inner iris ring -->
      <circle cx="120" cy="82" r="12" fill="#d97757" opacity="0.4"/>
      <!-- Right eye pupil -->
      <circle cx="120" cy="82" r="8" fill="#2d1f17"/>
      <!-- Right eye highlight primary -->
      <circle cx="125" cy="77" r="3.5" fill="#faf7f4" opacity="0.85"/>
      <!-- Right eye highlight secondary -->
      <circle cx="117" cy="87" r="1.5" fill="#faf7f4" opacity="0.4"/>
    </g>

    <!-- Beak: small cute downward triangle -->
    <polygon id="beak" points="100,100 94,109 106,109" fill="#b85a3a"/>

    <!-- Chest crystal chevrons: precise V-shapes, gem-like pattern -->
    <g id="chest-chevrons" fill="none" stroke="#e8a087" stroke-linecap="square" stroke-linejoin="miter">
      <polyline points="90,143 100,135 110,143" stroke-width="3"/>
      <polyline points="86,152 100,142 114,152" stroke-width="2.5"/>
      <polyline points="82,161 100,149 118,161" stroke-width="2"/>
      <polyline points="78,170 100,156 122,170" stroke-width="1.6"/>
    </g>

  </g>
</svg>
