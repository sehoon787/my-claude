name: Sync Upstream Dependencies
on:
  schedule:
    - cron: '0 6 * * 1'    # Every Monday 06:00 UTC
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. Agency Agents ──
      - name: Check agency-agents for changes
        id: check-agency
        run: |
          REMOTE_SHA=$(git ls-remote https://github.com/msitarzewski/agency-agents.git HEAD | cut -f1)
          LOCAL_SHA=$(jq -r '.["agency-agents"].syncedSha' upstream/SOURCES.json)
          if [ "$REMOTE_SHA" = "$LOCAL_SHA" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "agency-agents: no changes (SHA $LOCAL_SHA)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "agency-agents: changes detected ($LOCAL_SHA → $REMOTE_SHA)"
          fi

      - name: Sync agency-agents
        if: steps.check-agency.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://github.com/msitarzewski/agency-agents.git /tmp/agency
          AGENCY_SHA=$(cd /tmp/agency && git rev-parse HEAD)
          AGENCY_TAG=$(cd /tmp/agency && git describe --tags --exact-match 2>/dev/null || echo "null")
          echo "AGENCY_SHA=$AGENCY_SHA" >> $GITHUB_ENV
          echo "AGENCY_TAG=$AGENCY_TAG" >> $GITHUB_ENV

          for cat in engineering design testing product game-development marketing \
                     sales academic project-management specialized spatial-computing \
                     support strategy paid-media; do
            if [ -d "/tmp/agency/$cat" ]; then
              mkdir -p "agents/agency/$cat"
              cp /tmp/agency/$cat/*.md "agents/agency/$cat/" 2>/dev/null || true
            fi
          done
          # Add model field to agents missing it
          find agents/agency -name '*.md' | while read f; do
            if ! grep -q '^model:' "$f"; then
              sed -i '/^description:/a model: claude-sonnet-4-6' "$f"
            fi
          done
          AGENCY_COUNT=$(find agents/agency -name '*.md' | wc -l)
          echo "AGENCY_COUNT=$AGENCY_COUNT" >> $GITHUB_ENV

      - name: Count agency-agents (when unchanged)
        if: steps.check-agency.outputs.skip == 'true'
        run: |
          AGENCY_COUNT=$(find agents/agency -name '*.md' | wc -l)
          AGENCY_SHA=$(jq -r '.["agency-agents"].syncedSha // ""' upstream/SOURCES.json)
          AGENCY_TAG=$(jq -r '.["agency-agents"].syncedTag // "null"' upstream/SOURCES.json)
          echo "AGENCY_COUNT=$AGENCY_COUNT" >> $GITHUB_ENV
          echo "AGENCY_SHA=$AGENCY_SHA" >> $GITHUB_ENV
          echo "AGENCY_TAG=$AGENCY_TAG" >> $GITHUB_ENV

      # ── 2. ECC Skills + Rules ──
      - name: Check everything-claude-code for changes
        id: check-ecc
        run: |
          REMOTE_SHA=$(git ls-remote https://github.com/affaan-m/everything-claude-code.git HEAD | cut -f1)
          LOCAL_SHA=$(jq -r '.["everything-claude-code"].syncedSha' upstream/SOURCES.json)
          if [ "$REMOTE_SHA" = "$LOCAL_SHA" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "everything-claude-code: no changes (SHA $LOCAL_SHA)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "everything-claude-code: changes detected ($LOCAL_SHA → $REMOTE_SHA)"
          fi

      - name: Sync everything-claude-code
        if: steps.check-ecc.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://github.com/affaan-m/everything-claude-code.git /tmp/ecc
          ECC_SHA=$(cd /tmp/ecc && git rev-parse HEAD)
          ECC_TAG=$(cd /tmp/ecc && git describe --tags --exact-match 2>/dev/null || echo "null")
          echo "ECC_SHA=$ECC_SHA" >> $GITHUB_ENV
          echo "ECC_TAG=$ECC_TAG" >> $GITHUB_ENV

          if [ -d /tmp/ecc/skills ]; then
            rm -rf skills/ecc && mkdir -p skills/ecc
            cp -r /tmp/ecc/skills/* skills/ecc/
          fi
          if [ -d /tmp/ecc/rules ]; then
            # Remove only ECC-sourced rule directories (preserve any my-claude originals)
            for ecc_dir in /tmp/ecc/rules/*/; do
              [ ! -d "$ecc_dir" ] && continue
              rm -rf "rules/$(basename "$ecc_dir")"
            done
            # Remove ECC-sourced root files (e.g. README.md)
            for ecc_file in /tmp/ecc/rules/*; do
              [ ! -f "$ecc_file" ] && continue
              rm -f "rules/$(basename "$ecc_file")"
            done
            mkdir -p rules
            cp -r /tmp/ecc/rules/* rules/
          fi
          ECC_SKILLS=$(find skills/ecc -name 'SKILL.md' | wc -l)
          ECC_RULES=$(find rules -name '*.md' | wc -l)
          echo "ECC_SKILLS=$ECC_SKILLS" >> $GITHUB_ENV
          echo "ECC_RULES=$ECC_RULES" >> $GITHUB_ENV

      - name: Count everything-claude-code (when unchanged)
        if: steps.check-ecc.outputs.skip == 'true'
        run: |
          ECC_SKILLS=$(find skills/ecc -name 'SKILL.md' 2>/dev/null | wc -l)
          ECC_RULES=$(find rules -name '*.md' 2>/dev/null | wc -l)
          ECC_SHA=$(jq -r '.["everything-claude-code"].syncedSha // ""' upstream/SOURCES.json)
          ECC_TAG=$(jq -r '.["everything-claude-code"].syncedTag // "null"' upstream/SOURCES.json)
          echo "ECC_SKILLS=$ECC_SKILLS" >> $GITHUB_ENV
          echo "ECC_RULES=$ECC_RULES" >> $GITHUB_ENV
          echo "ECC_SHA=$ECC_SHA" >> $GITHUB_ENV
          echo "ECC_TAG=$ECC_TAG" >> $GITHUB_ENV

      # ── 3b. gstack (vendor skill .md files) ──
      - name: Check gstack for changes
        id: check-gstack
        run: |
          REMOTE_SHA=$(git ls-remote https://github.com/garrytan/gstack.git HEAD | cut -f1)
          LOCAL_SHA=$(jq -r '.gstack.syncedSha // "none"' upstream/SOURCES.json)
          if [ "$REMOTE_SHA" = "$LOCAL_SHA" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "gstack: no changes (SHA $LOCAL_SHA)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "gstack: changes detected ($LOCAL_SHA → $REMOTE_SHA)"
          fi

      - name: Sync gstack skills
        if: steps.check-gstack.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://github.com/garrytan/gstack.git /tmp/gstack
          GSTACK_SHA=$(cd /tmp/gstack && git rev-parse HEAD)
          GSTACK_TAG=$(cd /tmp/gstack && git describe --tags --exact-match 2>/dev/null || echo "null")
          echo "GSTACK_SHA=$GSTACK_SHA" >> $GITHUB_ENV
          echo "GSTACK_TAG=$GSTACK_TAG" >> $GITHUB_ENV

          # Vendor SKILL.md files only (no binaries, no node_modules)
          rm -rf skills/gstack && mkdir -p skills/gstack
          # Root SKILL.md
          cp /tmp/gstack/SKILL.md skills/gstack/
          # Sub-skill directories
          for dir in /tmp/gstack/*/; do
            [ -f "$dir/SKILL.md" ] || continue
            name=$(basename "$dir")
            case "$name" in .git|.github|bin|node_modules|agents|lib|scripts|test|docs|extension|hosts|contrib|openclaw|design) continue ;; esac
            mkdir -p "skills/gstack/$name"
            cp "$dir/SKILL.md" "skills/gstack/$name/"
          done

          GSTACK_SKILLS=$(find skills/gstack -name 'SKILL.md' | wc -l | tr -d ' ')
          echo "GSTACK_SKILLS=$GSTACK_SKILLS" >> $GITHUB_ENV

          # Remove ECC skills superseded by gstack
          for d in benchmark canary-watch safety-guard browser-qa verification-loop security-review design-system; do
            rm -rf "skills/ecc/$d"
          done

      - name: Count gstack skills (when unchanged)
        if: steps.check-gstack.outputs.skip == 'true'
        run: |
          GSTACK_SKILLS=$(find skills/gstack -name 'SKILL.md' 2>/dev/null | wc -l | tr -d ' ')
          GSTACK_SHA=$(jq -r '.gstack.syncedSha // ""' upstream/SOURCES.json)
          GSTACK_TAG=$(jq -r '.gstack.syncedTag // "null"' upstream/SOURCES.json)
          echo "GSTACK_SKILLS=$GSTACK_SKILLS" >> $GITHUB_ENV
          echo "GSTACK_SHA=$GSTACK_SHA" >> $GITHUB_ENV
          echo "GSTACK_TAG=$GSTACK_TAG" >> $GITHUB_ENV

      # ── 3. OMC Agents + Skills ──
      - name: Check oh-my-claudecode for changes
        id: check-omc
        run: |
          REMOTE_SHA=$(git ls-remote https://github.com/Yeachan-Heo/oh-my-claudecode.git HEAD | cut -f1)
          LOCAL_SHA=$(jq -r '.["oh-my-claudecode"].syncedSha' upstream/SOURCES.json)
          if [ "$REMOTE_SHA" = "$LOCAL_SHA" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "oh-my-claudecode: no changes (SHA $LOCAL_SHA)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "oh-my-claudecode: changes detected ($LOCAL_SHA → $REMOTE_SHA)"
          fi

      - name: Sync oh-my-claudecode
        if: steps.check-omc.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://github.com/Yeachan-Heo/oh-my-claudecode.git /tmp/omc
          OMC_SHA=$(cd /tmp/omc && git rev-parse HEAD)
          OMC_TAG=$(cd /tmp/omc && git describe --tags --exact-match 2>/dev/null || echo "null")
          echo "OMC_SHA=$OMC_SHA" >> $GITHUB_ENV
          echo "OMC_TAG=$OMC_TAG" >> $GITHUB_ENV

          if [ -d /tmp/omc/agents ]; then
            rm -rf agents/omc && mkdir -p agents/omc
            cp /tmp/omc/agents/*.md agents/omc/
          fi
          # NOTE: skills/core/ contains my-claude originals — NEVER rm -rf
          if [ -d /tmp/omc/skills ]; then
            rm -rf skills/omc && mkdir -p skills/omc
            cp -r /tmp/omc/skills/* skills/omc/
          fi
          OMC_AGENTS=$(find agents/omc -name '*.md' | wc -l)
          OMC_SKILLS=$(find skills/omc -name 'SKILL.md' | wc -l)
          echo "OMC_AGENTS=$OMC_AGENTS" >> $GITHUB_ENV
          echo "OMC_SKILLS=$OMC_SKILLS" >> $GITHUB_ENV

      - name: Count oh-my-claudecode (when unchanged)
        if: steps.check-omc.outputs.skip == 'true'
        run: |
          OMC_AGENTS=$(find agents/omc -name '*.md' 2>/dev/null | wc -l)
          OMC_SKILLS=$(find skills/omc -name 'SKILL.md' 2>/dev/null | wc -l)
          OMC_SHA=$(jq -r '.["oh-my-claudecode"].syncedSha // ""' upstream/SOURCES.json)
          OMC_TAG=$(jq -r '.["oh-my-claudecode"].syncedTag // "null"' upstream/SOURCES.json)
          echo "OMC_AGENTS=$OMC_AGENTS" >> $GITHUB_ENV
          echo "OMC_SKILLS=$OMC_SKILLS" >> $GITHUB_ENV
          echo "OMC_SHA=$OMC_SHA" >> $GITHUB_ENV
          echo "OMC_TAG=$OMC_TAG" >> $GITHUB_ENV

      # ── 3c. Superpowers ──
      - name: Check superpowers for changes
        id: check-superpowers
        run: |
          REMOTE_SHA=$(git ls-remote https://github.com/obra/superpowers.git HEAD | cut -f1)
          LOCAL_SHA=$(jq -r '.superpowers.syncedSha // "none"' upstream/SOURCES.json)
          if [ "$REMOTE_SHA" = "$LOCAL_SHA" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "superpowers: no changes (SHA $LOCAL_SHA)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "superpowers: changes detected ($LOCAL_SHA → $REMOTE_SHA)"
          fi

      - name: Sync superpowers
        if: steps.check-superpowers.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://github.com/obra/superpowers.git /tmp/superpowers
          SUPERPOWERS_SHA=$(cd /tmp/superpowers && git rev-parse HEAD)
          SUPERPOWERS_TAG=$(cd /tmp/superpowers && git describe --tags --exact-match 2>/dev/null || echo "null")
          echo "SUPERPOWERS_SHA=$SUPERPOWERS_SHA" >> $GITHUB_ENV
          echo "SUPERPOWERS_TAG=$SUPERPOWERS_TAG" >> $GITHUB_ENV

          # Agent
          if [ -d /tmp/superpowers/agents ]; then
            rm -rf agents/superpowers && mkdir -p agents/superpowers
            cp /tmp/superpowers/agents/*.md agents/superpowers/ 2>/dev/null || true
          fi
          # Skills
          if [ -d /tmp/superpowers/skills ]; then
            rm -rf skills/superpowers && mkdir -p skills/superpowers
            cp -r /tmp/superpowers/skills/* skills/superpowers/
          fi
          SUPERPOWERS_AGENTS=$(find agents/superpowers -name '*.md' 2>/dev/null | wc -l)
          SUPERPOWERS_SKILLS=$(find skills/superpowers -name 'SKILL.md' 2>/dev/null | wc -l)
          echo "SUPERPOWERS_AGENTS=$SUPERPOWERS_AGENTS" >> $GITHUB_ENV
          echo "SUPERPOWERS_SKILLS=$SUPERPOWERS_SKILLS" >> $GITHUB_ENV

      - name: Count superpowers (when unchanged)
        if: steps.check-superpowers.outputs.skip == 'true'
        run: |
          SUPERPOWERS_AGENTS=$(find agents/superpowers -name '*.md' 2>/dev/null | wc -l)
          SUPERPOWERS_SKILLS=$(find skills/superpowers -name 'SKILL.md' 2>/dev/null | wc -l)
          SUPERPOWERS_SHA=$(jq -r '.superpowers.syncedSha // ""' upstream/SOURCES.json)
          SUPERPOWERS_TAG=$(jq -r '.superpowers.syncedTag // "null"' upstream/SOURCES.json)
          echo "SUPERPOWERS_AGENTS=$SUPERPOWERS_AGENTS" >> $GITHUB_ENV
          echo "SUPERPOWERS_SKILLS=$SUPERPOWERS_SKILLS" >> $GITHUB_ENV
          echo "SUPERPOWERS_SHA=$SUPERPOWERS_SHA" >> $GITHUB_ENV
          echo "SUPERPOWERS_TAG=$SUPERPOWERS_TAG" >> $GITHUB_ENV

      # ── 4. Update SOURCES.json ──
      - name: Update SOURCES.json with SHA tracking
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          node -e "
            const fs = require('fs');
            const q = v => v === 'null' ? null : v;
            const short = sha => sha.substring(0, 7);
            const sources = {
              'agency-agents': {
                repo: 'https://github.com/msitarzewski/agency-agents',
                branch: 'main',
                syncedSha: '$AGENCY_SHA',
                syncedTag: q('$AGENCY_TAG'),
                syncedAt: '$NOW',
                compareUrl: 'https://github.com/msitarzewski/agency-agents/compare/' + short('$AGENCY_SHA') + '...HEAD',
                files: { agents: parseInt('$AGENCY_COUNT') }
              },
              'everything-claude-code': {
                repo: 'https://github.com/affaan-m/everything-claude-code',
                branch: 'main',
                syncedSha: '$ECC_SHA',
                syncedTag: q('$ECC_TAG'),
                syncedAt: '$NOW',
                compareUrl: 'https://github.com/affaan-m/everything-claude-code/compare/' + short('$ECC_SHA') + '...HEAD',
                files: { skills: parseInt('$ECC_SKILLS'), rules: parseInt('$ECC_RULES') }
              },
              'oh-my-claudecode': {
                repo: 'https://github.com/Yeachan-Heo/oh-my-claudecode',
                branch: 'main',
                syncedSha: '$OMC_SHA',
                syncedTag: q('$OMC_TAG'),
                syncedAt: '$NOW',
                compareUrl: 'https://github.com/Yeachan-Heo/oh-my-claudecode/compare/' + short('$OMC_SHA') + '...HEAD',
                files: { agents: parseInt('$OMC_AGENTS'), skills: parseInt('$OMC_SKILLS') }
              },
              'superpowers': {
                repo: 'https://github.com/obra/superpowers',
                branch: 'main',
                syncedSha: '$SUPERPOWERS_SHA',
                syncedTag: q('$SUPERPOWERS_TAG'),
                syncedAt: '$NOW',
                compareUrl: 'https://github.com/obra/superpowers/compare/' + short('$SUPERPOWERS_SHA') + '...HEAD',
                files: { agents: parseInt('$SUPERPOWERS_AGENTS'), skills: parseInt('$SUPERPOWERS_SKILLS') }
              },
              'omo': {
                repo: 'self-maintained',
                branch: 'main',
                syncedSha: 'n/a',
                syncedTag: null,
                syncedAt: '$NOW',
                note: 'Curated agents derived from oh-my-opencode, maintained independently',
                files: { agents: 9 }
              },
              'gstack': {
                repo: 'https://github.com/garrytan/gstack',
                branch: 'main',
                syncedSha: '$GSTACK_SHA',
                syncedTag: q('$GSTACK_TAG'),
                syncedAt: '$NOW',
                license: 'MIT',
                strategy: 'vendor-skills',
                compareUrl: 'https://github.com/garrytan/gstack/compare/' + short('$GSTACK_SHA') + '...HEAD',
                files: { skills: parseInt('$GSTACK_SKILLS') }
              }
            };
            fs.mkdirSync('upstream', { recursive: true });
            fs.writeFileSync('upstream/SOURCES.json', JSON.stringify(sources, null, 2));
          "

      # ── 5. Update documentation counts ──
      - name: Update documentation counts
        run: |
          CORE_AGENTS=$(find agents/core -name '*.md' ! -name 'agent-teams-reference.md' | wc -l)
          OMO_AGENTS=$(find agents/omo -name '*.md' | wc -l)
          ENGINEERING_COUNT=$(find agents/agency/engineering -name '*.md' | wc -l)
          STRATEGY_COUNT=$(find agents/agency/strategy -name '*.md' | wc -l)
          CORE_TOTAL=$((CORE_AGENTS + OMO_AGENTS + OMC_AGENTS + ENGINEERING_COUNT + SUPERPOWERS_AGENTS))
          PACK_COUNT=$((AGENCY_COUNT - ENGINEERING_COUNT - STRATEGY_COUNT))
          TOTAL_AGENTS=$((CORE_TOTAL + PACK_COUNT))
          CORE_SKILLS=$(find skills/core -name 'SKILL.md' 2>/dev/null | wc -l | tr -d ' ')
          TOTAL_SKILLS=$((ECC_SKILLS + OMC_SKILLS + CORE_SKILLS + GSTACK_SKILLS + SUPERPOWERS_SKILLS))
          TOTAL_RULES=$((ECC_RULES))
          HOOKS=$(python3 -c "import json; d=json.load(open('hooks/hooks.json')); print(len(d.get('hooks',d)))" 2>/dev/null || echo 6)

          # README.md
          sed -i "s/agents-[0-9]\+/agents-${TOTAL_AGENTS}/" README.md
          sed -i "s/skills-[0-9]\+/skills-${TOTAL_SKILLS}/" README.md
          sed -i -E "s/Scanning\.\.\. [0-9]+ agents, [0-9]+ skills ready/Scanning... ${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills ready/" README.md
          sed -i "s/\*\*[0-9]\+ agents\*\* ([0-9]\+ core + [0-9]\+ domain agent-packs)/\*\*${TOTAL_AGENTS} agents\*\* (${CORE_TOTAL} core + ${PACK_COUNT} domain agent-packs)/" README.md
          sed -i "s/| Core Agents | [0-9]\+ |/| Core Agents | ${CORE_TOTAL} |/" README.md
          sed -i "s/| Agent Packs | [0-9]\+ |/| Agent Packs | ${PACK_COUNT} |/" README.md
          sed -i "s/\*\*[0-9]\+ skills\*\*/\*\*${TOTAL_SKILLS} skills\*\*/g" README.md
          sed -i "s/\*\*[0-9]\+ rules\*\*/\*\*${TOTAL_RULES} rules\*\*/g" README.md
          sed -i "s/[0-9]\+ agents, [0-9]\+ skills, and [0-9]\+ rules/${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills, and ${TOTAL_RULES} rules/" README.md
          sed -i "s/ECC [0-9]\+ + OMC [0-9]\+\( + Core [0-9]\+\)\?\( + gstack [0-9]\+\)\?/ECC ${ECC_SKILLS} + OMC ${OMC_SKILLS} + Core ${CORE_SKILLS} + gstack ${GSTACK_SKILLS}/" README.md
          sed -i "s/| Rules | [0-9]\+ |/| Rules | ${TOTAL_RULES} |/" README.md
          sed -i "s/Rules ([0-9]\+)/Rules (${TOTAL_RULES})/" README.md
          sed -i "s/| Skills | [0-9]\+ |/| Skills | ${TOTAL_SKILLS} |/" README.md

          # docs/i18n/README.ko.md
          KO=docs/i18n/README.ko.md
          sed -i "s/agents-[0-9]\+/agents-${TOTAL_AGENTS}/" "$KO"
          sed -i "s/skills-[0-9]\+/skills-${TOTAL_SKILLS}/" "$KO"
          sed -i -E "s/Scanning\.\.\. [0-9]+ agents, [0-9]+ skills ready/Scanning... ${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills ready/" "$KO"
          sed -i "s/\*\*[0-9]\+개 에이전트\*\* (/\*\*${TOTAL_AGENTS}개 에이전트\*\* (/" "$KO"
          sed -i "s/([0-9]\+개 코어 + [0-9]\+개 도메인 에이전트 팩)/(${CORE_TOTAL}개 코어 + ${PACK_COUNT}개 도메인 에이전트 팩)/" "$KO"
          sed -i "s/| 코어 에이전트 | [0-9]\+ |/| 코어 에이전트 | ${CORE_TOTAL} |/" "$KO"
          sed -i "s/| 에이전트 팩 | [0-9]\+ |/| 에이전트 팩 | ${PACK_COUNT} |/" "$KO"
          sed -i "s/\*\*[0-9]\+개 스킬\*\*/\*\*${TOTAL_SKILLS}개 스킬\*\*/g" "$KO"
          sed -i "s/\*\*[0-9]\+개 룰\*\*/\*\*${TOTAL_RULES}개 룰\*\*/g" "$KO"
          sed -i "s/[0-9]\+ 에이전트, [0-9]\+ 스킬, [0-9]\+ 룰/${TOTAL_AGENTS} 에이전트, ${TOTAL_SKILLS} 스킬, ${TOTAL_RULES} 룰/" "$KO"
          sed -i "s/ECC [0-9]\+ + OMC [0-9]\+\( + Core [0-9]\+\)\?\( + gstack [0-9]\+\)\?/ECC ${ECC_SKILLS} + OMC ${OMC_SKILLS} + Core ${CORE_SKILLS} + gstack ${GSTACK_SKILLS}/" "$KO"
          sed -i "s/룰 ([0-9]\+개)/룰 (${TOTAL_RULES}개)/" "$KO"
          sed -i "s/| 스킬 | [0-9]\+ |/| 스킬 | ${TOTAL_SKILLS} |/" "$KO"
          sed -i "s/| 룰 | [0-9]\+ |/| 룰 | ${TOTAL_RULES} |/" "$KO"
          sed -i "s/스캐닝\.\.\. [0-9]\+개 에이전트, [0-9]\+개 스킬/스캐닝... ${TOTAL_AGENTS}개 에이전트, ${TOTAL_SKILLS}개 스킬/" "$KO"

          # docs/i18n/README.fr.md
          sed -i "s/agents-[0-9]\+/agents-${TOTAL_AGENTS}/" docs/i18n/README.fr.md
          sed -i "s/skills-[0-9]\+/skills-${TOTAL_SKILLS}/" docs/i18n/README.fr.md
          sed -i "s/\*\*[0-9]\+ agents\*\*/\*\*${TOTAL_AGENTS} agents\*\*/g" docs/i18n/README.fr.md
          sed -i "s/\*\*[0-9]\+ skills\*\*/\*\*${TOTAL_SKILLS} skills\*\*/g" docs/i18n/README.fr.md
          sed -i "s/\*\*[0-9]\+ règles\*\*/\*\*${TOTAL_RULES} règles\*\*/g" docs/i18n/README.fr.md
          sed -i "s/[0-9]\+ agents, [0-9]\+ skills et [0-9]\+ règles/${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills et ${TOTAL_RULES} règles/g" docs/i18n/README.fr.md
          sed -i "s/ECC [0-9]\+ + OMC [0-9]\+\( + Core [0-9]\+\)\?\( + gstack [0-9]\+\)\?/ECC ${ECC_SKILLS} + OMC ${OMC_SKILLS} + Core ${CORE_SKILLS} + gstack ${GSTACK_SKILLS}/" docs/i18n/README.fr.md
          sed -i "s/| Agents cœur | [0-9]\+ |/| Agents cœur | ${CORE_TOTAL} |/" docs/i18n/README.fr.md
          sed -i "s/| Agent Packs | [0-9]\+ |/| Agent Packs | ${PACK_COUNT} |/" docs/i18n/README.fr.md
          sed -i "s/| Skills | [0-9]\+ |/| Skills | ${TOTAL_SKILLS} |/" docs/i18n/README.fr.md
          sed -i "s/| Règles | [0-9]\+ |/| Règles | ${TOTAL_RULES} |/" docs/i18n/README.fr.md
          sed -i "s/[0-9]\+ agents, [0-9]\+ skills ready/${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills ready/" docs/i18n/README.fr.md

          # docs/i18n/README.zh.md
          sed -i "s/agents-[0-9]\+/agents-${TOTAL_AGENTS}/" docs/i18n/README.zh.md
          sed -i "s/skills-[0-9]\+/skills-${TOTAL_SKILLS}/" docs/i18n/README.zh.md
          sed -i -E "s/\*\*[0-9]+ 个代理\*\*、\*\*[0-9]+ 个技能\*\*/**${TOTAL_AGENTS} 个代理**、**${TOTAL_SKILLS} 个技能**/" docs/i18n/README.zh.md
          sed -i -E "s/[0-9]+ 个代理、[0-9]+ 个技能和 [0-9]+ 个规则/${TOTAL_AGENTS} 个代理、${TOTAL_SKILLS} 个技能和 ${TOTAL_RULES} 个规则/" docs/i18n/README.zh.md
          sed -i -E "s/\*\*[0-9]+ 个核心代理\*\*/**${CORE_TOTAL} 个核心代理**/g" docs/i18n/README.zh.md
          sed -i -E "s/\*\*[0-9]+ 个领域代理包\*\*/**${PACK_COUNT} 个领域代理包**/g" docs/i18n/README.zh.md
          sed -i -E "s/\| 核心代理 \| [0-9]+ \|/| 核心代理 | ${CORE_TOTAL} |/" docs/i18n/README.zh.md
          sed -i -E "s/\| 代理包 \| [0-9]+ \|/| 代理包 | ${PACK_COUNT} |/" docs/i18n/README.zh.md
          sed -i -E "s/\| 技能 \| [0-9]+ \|/| 技能 | ${TOTAL_SKILLS} |/" docs/i18n/README.zh.md
          sed -i -E "s/\| 规则 \| [0-9]+ \|/| 规则 | ${TOTAL_RULES} |/" docs/i18n/README.zh.md
          sed -i -E "s/ECC [0-9]+ \+ OMC [0-9]+( \+ Core [0-9]+)?( \+ gstack [0-9]+)?/ECC ${ECC_SKILLS} + OMC ${OMC_SKILLS} + Core ${CORE_SKILLS} + gstack ${GSTACK_SKILLS}/" docs/i18n/README.zh.md
          sed -i -E "s/扫描中\.\.\. [0-9]+ 个代理，[0-9]+ 个技能就绪/扫描中... ${TOTAL_AGENTS} 个代理，${TOTAL_SKILLS} 个技能就绪/" docs/i18n/README.zh.md

          # docs/i18n/README.de.md
          sed -i "s/agents-[0-9]\+/agents-${TOTAL_AGENTS}/" docs/i18n/README.de.md
          sed -i "s/skills-[0-9]\+/skills-${TOTAL_SKILLS}/" docs/i18n/README.de.md
          sed -i -E "s/\*\*[0-9]+ Agenten\*\*, \*\*[0-9]+ Skills\*\*/**${TOTAL_AGENTS} Agenten**, **${TOTAL_SKILLS} Skills**/" docs/i18n/README.de.md
          sed -i -E "s/[0-9]+ Agenten, [0-9]+ Skills und [0-9]+ Regeln/${TOTAL_AGENTS} Agenten, ${TOTAL_SKILLS} Skills und ${TOTAL_RULES} Regeln/" docs/i18n/README.de.md
          sed -i -E "s/\*\*[0-9]+ Kern-Agenten\*\*/**${CORE_TOTAL} Kern-Agenten**/g" docs/i18n/README.de.md
          sed -i -E "s/\*\*[0-9]+ Domain-Agent-Packs\*\*/**${PACK_COUNT} Domain-Agent-Packs**/g" docs/i18n/README.de.md
          sed -i -E "s/\| Kern-Agenten \| [0-9]+ \|/| Kern-Agenten | ${CORE_TOTAL} |/" docs/i18n/README.de.md
          sed -i -E "s/\| Skills \| [0-9]+ \|/| Skills | ${TOTAL_SKILLS} |/" docs/i18n/README.de.md
          sed -i -E "s/ECC [0-9]+ \+ OMC [0-9]+( \+ Core [0-9]+)?( \+ gstack [0-9]+)?/ECC ${ECC_SKILLS} + OMC ${OMC_SKILLS} + Core ${CORE_SKILLS} + gstack ${GSTACK_SKILLS}/" docs/i18n/README.de.md
          sed -i -E "s/Scanning\.\.\. [0-9]+ agents, [0-9]+ skills ready/Scanning... ${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills ready/" docs/i18n/README.de.md

          # docs/i18n/README.ja.md
          JA=docs/i18n/README.ja.md
          sed -i "s/agents-[0-9]\+/agents-${TOTAL_AGENTS}/" "$JA"
          sed -i "s/skills-[0-9]\+/skills-${TOTAL_SKILLS}/" "$JA"
          sed -i -E "s/\*\*[0-9]+ エージェント\*\*、\*\*[0-9]+ スキル\*\*/**${TOTAL_AGENTS} エージェント**、**${TOTAL_SKILLS} スキル**/" "$JA"
          sed -i -E "s/[0-9]+ エージェント、[0-9]+ スキル、[0-9]+ ルール/${TOTAL_AGENTS} エージェント、${TOTAL_SKILLS} スキル、${TOTAL_RULES} ルール/" "$JA"
          sed -i -E "s/\*\*[0-9]+ のコアエージェント\*\*/**${CORE_TOTAL} のコアエージェント**/g" "$JA"
          sed -i -E "s/\*\*[0-9]+ のドメイン エージェント パック\*\*/**${PACK_COUNT} のドメイン エージェント パック**/g" "$JA"
          sed -i -E "s/\| コア エージェント \| [0-9]+ \|/| コア エージェント | ${CORE_TOTAL} |/" "$JA"
          sed -i -E "s/\| エージェント パック \| [0-9]+ \|/| エージェント パック | ${PACK_COUNT} |/" "$JA"
          sed -i -E "s/\| スキル \| [0-9]+ \|/| スキル | ${TOTAL_SKILLS} |/" "$JA"
          sed -i -E "s/ECC [0-9]+ \+ OMC [0-9]+( \+ Core [0-9]+)?( \+ gstack [0-9]+)?/ECC ${ECC_SKILLS} + OMC ${OMC_SKILLS} + Core ${CORE_SKILLS} + gstack ${GSTACK_SKILLS}/" "$JA"
          sed -i -E "s/スキャン中\.\.\./スキャン中.../" "$JA"
          sed -i -E "s/[0-9]+ エージェント、[0-9]+ スキル準備完了/${TOTAL_AGENTS} エージェント、${TOTAL_SKILLS} スキル準備完了/" "$JA"

          # AI-INSTALL.md
          if [ -f AI-INSTALL.md ]; then
            sed -i -E "s/[0-9]+ agents \([0-9]+ core \+ [0-9]+ domain agent-packs\)/${TOTAL_AGENTS} agents (${CORE_TOTAL} core + ${PACK_COUNT} domain agent-packs)/" AI-INSTALL.md
            sed -i -E "s/[0-9]+ skills, [0-9]+ rules/${TOTAL_SKILLS} skills, ${TOTAL_RULES} rules/" AI-INSTALL.md
            sed -i -E "s/[0-9]+ core agents in/${CORE_TOTAL} core agents in/" AI-INSTALL.md
            sed -i -E "s/[0-9]+ domain agent-packs in/${PACK_COUNT} domain agent-packs in/" AI-INSTALL.md
            PATTERN='[0-9]+ skills \([0-9]+ ECC \+ [0-9]+ OMC( \+ [0-9]+ Core)?( \+ [0-9]+ gstack)?\)'
            REPLACE="${TOTAL_SKILLS} skills (${ECC_SKILLS} ECC + ${OMC_SKILLS} OMC + ${CORE_SKILLS} Core + ${GSTACK_SKILLS} gstack)"
            sed -i -E "s/$PATTERN/$REPLACE/" AI-INSTALL.md
            sed -i -E "s/Core agents: [0-9]+\+/Core agents: ${CORE_TOTAL}+/" AI-INSTALL.md
            sed -i -E "s/Agent packs: [0-9]+\+/Agent packs: ${PACK_COUNT}+/" AI-INSTALL.md
            sed -i -E "s/Plugin skills: [0-9]+\+/Plugin skills: ${TOTAL_SKILLS}+/" AI-INSTALL.md
            sed -i -E "s/Rules: [0-9]+$/Rules: ${TOTAL_RULES}/" AI-INSTALL.md
          fi

          # .claude-plugin/plugin.json
          sed -i -E "s/[0-9]+ core agents \+ [0-9]+ domain agent-packs, [0-9]+ skills/${CORE_TOTAL} core agents + ${PACK_COUNT} domain agent-packs, ${TOTAL_SKILLS} skills/" .claude-plugin/plugin.json

          # .claude-plugin/marketplace.json
          MKT=.claude-plugin/marketplace.json
          sed -i -E "s/[0-9]+ core agents always loaded \+ [0-9]+ domain agent-packs on demand/${CORE_TOTAL} core agents always loaded + ${PACK_COUNT} domain agent-packs on demand/g" "$MKT"
          sed -i -E "s/[0-9]+ skills, [0-9]+ rules, [0-9]+ hooks/${TOTAL_SKILLS} skills, ${TOTAL_RULES} rules, ${HOOKS} hooks/" "$MKT"
          sed -i -E "s/[0-9]+ skills, [0-9]+ rules/${TOTAL_SKILLS} skills, ${TOTAL_RULES} rules/g" "$MKT"

          # docs/index.html — targeted updates only
          if [ -f docs/index.html ]; then
            # Meta tags (match full "N agents, N skills" context)
            sed -i -E "s/[0-9]+ agents, [0-9]+ skills, [0-9]+ rules/${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills, ${TOTAL_RULES} rules/g" docs/index.html
            sed -i -E "s/[0-9]+ agents, [0-9]+ skills, 3 MCP/${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills, 3 MCP/g" docs/index.html
            # Hero data-count attributes
            sed -i -E 's/data-count="[0-9]+"(>0<\/em> <span class="lang" data-en="agents")/data-count="'"${TOTAL_AGENTS}"'"\1/' docs/index.html
            sed -i -E 's/data-count="[0-9]+"(>0<\/em> <span class="lang" data-en="skills")/data-count="'"${TOTAL_SKILLS}"'"\1/' docs/index.html
            # Terminal demo lines "Scanning... N agents, N skills"
            sed -i -E "s/Scanning\.\.\. [0-9]+ agents, [0-9]+ skills/Scanning... ${TOTAL_AGENTS} agents, ${TOTAL_SKILLS} skills/g" docs/index.html
            # "get N agents" in feature description
            sed -i -E "s/get [0-9]+ agents/get ${TOTAL_AGENTS} agents/" docs/index.html
            # Scan counts in pre block
            sed -i -E "s/(agents\/    → )[0-9]+( found)/\1${TOTAL_AGENTS}\2/" docs/index.html
            sed -i -E "s/(skills\/    → )[0-9]+( found)/\1${TOTAL_SKILLS}\2/" docs/index.html
            # Catalog subtitle "N agents across 4 tiers"
            sed -i -E "s/[0-9]+ agents across 4 tiers/${TOTAL_AGENTS} agents across 4 tiers/" docs/index.html
            # Comparison table "N Pre-built Agents"
            sed -i -E "s/[0-9]+ Pre-built Agents/${TOTAL_AGENTS} Pre-built Agents/" docs/index.html
            # KO totals (targeted — avoid "2-4개 에이전트" on line 403)
            sed -i -E "s/[0-9]+개 에이전트\./${TOTAL_AGENTS}개 에이전트./g" docs/index.html
            sed -i -E "s/걸친 [0-9]+개 에이전트/걸친 ${TOTAL_AGENTS}개 에이전트/" docs/index.html
            sed -i -E "s/[0-9]+개 에이전트를 얻/${TOTAL_AGENTS}개 에이전트를 얻/" docs/index.html
            sed -i -E "s/[0-9]+개 에이전트, [0-9]+개 스킬, [0-9]+개 규칙/${TOTAL_AGENTS}개 에이전트, ${TOTAL_SKILLS}개 스킬, ${TOTAL_RULES}개 규칙/" docs/index.html
            sed -i -E "s/[0-9]+개 사전 구축/${TOTAL_AGENTS}개 사전 구축/" docs/index.html
            # KO terminal demo "N 에이전트, N 스킬"
            sed -i -E "s/[0-9]+ 에이전트, [0-9]+ 스킬/${TOTAL_AGENTS} 에이전트, ${TOTAL_SKILLS} 스킬/g" docs/index.html
            # Engineering count in category description
            sed -i -E "s/Engineering \([0-9]+\)/Engineering (${ENGINEERING_COUNT})/" docs/index.html
            sed -i -E "s/엔지니어링\([0-9]+\)/엔지니어링(${ENGINEERING_COUNT})/" docs/index.html
          fi

          # tests/boss-routing-scenarios.md
          sed -i "s/Boss reports [0-9]\+ agents/Boss reports ${TOTAL_AGENTS} agents/" tests/boss-routing-scenarios.md
          sed -i "s/[0-9]\+ core + [0-9]\+ packs/${CORE_TOTAL} core + ${PACK_COUNT} packs/" tests/boss-routing-scenarios.md

          # SETUP.md — upstream project counts
          if [ -f SETUP.md ]; then
            sed -i -E "s/installs [0-9]+ agents \+ HUD/installs ${OMC_AGENTS} agents + HUD/" SETUP.md
            sed -i -E "s/# Full install \(all [0-9]+ agents\)/# Full install (all ${AGENCY_COUNT} agents)/" SETUP.md
            sed -i -E "s/OMC has [0-9]+ agents and omo has [0-9]+ agents/OMC has ${OMC_AGENTS} agents and omo has ${OMO_AGENTS} agents/" SETUP.md
            sed -i -E "s/\| \*\*Core\*\* \| [0-9]+ agents organized by department/| **Core** | ${AGENCY_COUNT} agents organized by department/" SETUP.md
          fi

          echo "Updated doc counts: ${TOTAL_AGENTS} agents (${CORE_TOTAL} core + ${PACK_COUNT} packs), ${TOTAL_SKILLS} skills, ${TOTAL_RULES} rules"

      # ── 6. Detect agent name duplicates ──
      - name: Detect agent name duplicates
        run: |
          # Normalize: lowercase, replace spaces with hyphens, remove common prefixes
          normalize() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g; s/^the-//; s/-agent$//'
          }
          echo "## Agent Duplicate Report" > /tmp/dedup-report.md
          DUPES_FOUND=false
          # Compare core/omo/omc agents against agency agents
          for core_agent in agents/core/*.md agents/omo/*.md agents/omc/*.md agents/superpowers/*.md; do
            [ -f "$core_agent" ] || continue
            core_name=$(head -5 "$core_agent" | grep '^name:' | sed 's/^name: *//')
            [ -z "$core_name" ] && continue
            core_norm=$(normalize "$core_name")
            for agency_agent in agents/agency/**/*.md; do
              [ -f "$agency_agent" ] || continue
              agency_name=$(head -5 "$agency_agent" | grep '^name:' | sed 's/^name: *//')
              [ -z "$agency_name" ] && continue
              agency_norm=$(normalize "$agency_name")
              if [ "$core_norm" = "$agency_norm" ]; then
                echo "- ⚠️ **$core_name** ($core_agent) ↔ **$agency_name** ($agency_agent)" >> /tmp/dedup-report.md
                DUPES_FOUND=true
              fi
            done
          done
          if [ "$DUPES_FOUND" = true ]; then
            echo "DEDUP_REPORT<<EOF" >> $GITHUB_ENV
            cat /tmp/dedup-report.md >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "DEDUP_REPORT=No duplicates detected." >> $GITHUB_ENV
          fi

      # ── 6b. Detect skill name duplicates ──
      - name: Detect skill name duplicates
        run: |
          echo "" >> /tmp/dedup-report.md
          echo "## Skill Duplicate Report" >> /tmp/dedup-report.md
          SKILL_DUPES=false
          # Check for skill directories that exist in multiple sources
          for src1_skill in skills/ecc/*/SKILL.md; do
            [ -f "$src1_skill" ] || continue
            name1=$(basename "$(dirname "$src1_skill")")
            for src2 in skills/omc skills/gstack skills/superpowers skills/core; do
              if [ -f "$src2/$name1/SKILL.md" ]; then
                echo "- ⚠️ **$name1** found in skills/ecc/ and $src2/" >> /tmp/dedup-report.md
                SKILL_DUPES=true
              fi
            done
          done
          for src1_skill in skills/omc/*/SKILL.md; do
            [ -f "$src1_skill" ] || continue
            name1=$(basename "$(dirname "$src1_skill")")
            for src2 in skills/gstack skills/superpowers skills/core; do
              if [ -f "$src2/$name1/SKILL.md" ]; then
                echo "- ⚠️ **$name1** found in skills/omc/ and $src2/" >> /tmp/dedup-report.md
                SKILL_DUPES=true
              fi
            done
          done
          if [ "$SKILL_DUPES" = true ]; then
            CURRENT="${DEDUP_REPORT:-No duplicates detected.}"
            echo "DEDUP_REPORT<<EOF" >> $GITHUB_ENV
            echo "$CURRENT" >> $GITHUB_ENV
            cat /tmp/dedup-report.md >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      # ── 7. Create PR if changes exist ──
      - name: Create sync PR
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="auto/sync-$(date +%Y%m%d-%H%M)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "chore: sync upstream dependencies ($(date +%Y-%m-%d))"
            git push -u origin "$BRANCH"
            printf '## Upstream Sync Summary\n\n' > /tmp/pr-body.md
            printf '| Source | SHA | Tag | Files |\n' >> /tmp/pr-body.md
            printf '|--------|-----|-----|-------|\n' >> /tmp/pr-body.md
            printf '| agency-agents | `%s` | %s | %s agents |\n' "${AGENCY_SHA:0:7}" "$AGENCY_TAG" "$AGENCY_COUNT" >> /tmp/pr-body.md
            printf '| everything-claude-code | `%s` | %s | %s skills, %s rules |\n' "${ECC_SHA:0:7}" "$ECC_TAG" "$ECC_SKILLS" "$ECC_RULES" >> /tmp/pr-body.md
            printf '| oh-my-claudecode | `%s` | %s | %s agents, %s skills |\n' "${OMC_SHA:0:7}" "$OMC_TAG" "$OMC_AGENTS" "$OMC_SKILLS" >> /tmp/pr-body.md
            printf '| superpowers | `%s` | %s | %s agents, %s skills |\n' "${SUPERPOWERS_SHA:0:7}" "$SUPERPOWERS_TAG" "$SUPERPOWERS_AGENTS" "$SUPERPOWERS_SKILLS" >> /tmp/pr-body.md
            printf '| gstack | `%s` | %s | %s skills |\n' "${GSTACK_SHA:0:7}" "$GSTACK_TAG" "$GSTACK_SKILLS" >> /tmp/pr-body.md
            printf '\nReview agent/skill diffs before merging.\n' >> /tmp/pr-body.md
            printf '\n${{ env.DEDUP_REPORT }}\n' >> /tmp/pr-body.md
            gh label create "auto-sync" --description "Automated upstream sync" --color "0E8A16" 2>/dev/null || true
            gh pr create \
              --title "chore: sync upstream ($(date +%Y-%m-%d))" \
              --body-file /tmp/pr-body.md \
              --label "auto-sync"
            # Report validate status so branch protection allows merge
            COMMIT_SHA=$(git rev-parse HEAD)
            gh api "repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
              -X POST \
              -f state=success \
              -f context=validate \
              -f description="Sync PR — validated inline"
            gh pr merge "$BRANCH" --auto --squash --delete-branch
          else
            echo "No changes detected — all upstream repos match current bundle"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
